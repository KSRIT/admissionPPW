<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการผู้สมัคร - โรงเรียนปากแพรกวิทยาคม</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // ตั้งค่า URL ของ Google Apps Script ที่ Deploy แล้ว
        // ==========================================
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbysA9t7bYvlDlOwBb-6vJCi7HbGrGoWaylKNzT63qrzTNgfcyBIf5eSS4vZd-s33lNq/exec"; 
        
        const { useState, useEffect } = React;

        const App = () => {
            const [password, setPassword] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [activeTab, setActiveTab] = useState('ม.1');
            const [students, setStudents] = useState([]);
            const [loadingAdmin, setLoadingAdmin] = useState(false);
            const [selectedStudent, setSelectedStudent] = useState(null);

            const login = (e) => {
                e.preventDefault();
                // รหัสผ่านเข้าแอดมิน
                if (password === '640551') {
                    setIsAuthenticated(true);
                    fetchStudents();
                } else {
                    alert('รหัสผ่านไม่ถูกต้อง');
                }
            };

            const fetchStudents = async () => {
                setLoadingAdmin(true);
                try {
                    const response = await fetch(`${GAS_WEBAPP_URL}?action=get_all`);
                    const result = await response.json();
                    if(result.status === 'success') {
                        // เรียงลำดับจากล่าสุดไปเก่าสุด
                        setStudents(result.data.reverse());
                    }
                } catch (e) {
                    console.log(e);
                    alert("เกิดข้อผิดพลาดในการดึงข้อมูลจากระบบ");
                }
                setLoadingAdmin(false);
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-800 to-gray-900">
                        <form onSubmit={login} className="bg-white p-10 rounded-xl shadow-2xl w-96 animate-fade-in-up">
                            <div className="text-center mb-6">
                                <div className="bg-gray-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i className="fas fa-shield-alt text-gray-800 text-3xl"></i>
                                </div>
                                <h2 className="text-2xl font-bold text-gray-800">ระบบผู้ดูแลระบบ</h2>
                                <p className="text-gray-500 text-sm mt-1">โรงเรียนปากแพรกวิทยาคม</p>
                            </div>
                            <input type="password" placeholder="กรุณากรอกรหัสผ่าน..." value={password} onChange={e=>setPassword(e.target.value)}
                                className="w-full p-4 border border-gray-300 rounded-lg mb-6 focus:ring-2 focus:ring-blue-500 focus:outline-none text-center text-lg tracking-widest" required/>
                            <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition shadow-lg font-bold">เข้าสู่ระบบ</button>
                            <div className="text-center mt-6">
                                <a href="index.html" className="text-gray-500 hover:text-gray-700 text-sm underline"><i className="fas fa-arrow-left mr-1"></i> กลับไปหน้าผู้สมัคร</a>
                            </div>
                        </form>
                    </div>
                );
            }

            const filteredStudents = students.filter(s => s.Level === activeTab);

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Admin Header */}
                    <div className="bg-white shadow">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16">
                                <div className="flex items-center">
                                    <i className="fas fa-user-shield text-blue-600 text-2xl mr-3"></i>
                                    <h1 className="text-xl font-bold text-gray-800">ระบบจัดการข้อมูลผู้สมัครเรียน</h1>
                                </div>
                                <div className="flex items-center">
                                    <button onClick={() => {setIsAuthenticated(false); setPassword('');}} className="bg-red-50 text-red-600 px-4 py-2 rounded-lg hover:bg-red-100 transition font-medium border border-red-200">
                                        <i className="fas fa-sign-out-alt mr-2"></i>ออกจากระบบ
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <div className="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
                            
                            {/* Tabs */}
                            <div className="flex border-b">
                                <button onClick={()=>setActiveTab('ม.1')} className={`flex-1 py-4 font-bold text-lg transition ${activeTab==='ม.1' ? 'bg-blue-50 text-blue-700 border-b-2 border-blue-600' : 'text-gray-500 hover:bg-gray-50'}`}>
                                    รายชื่อผู้สมัคร ม.1 <span className="ml-2 bg-gray-200 text-gray-700 text-xs px-2 py-1 rounded-full">{students.filter(s=>s.Level==='ม.1').length}</span>
                                </button>
                                <button onClick={()=>setActiveTab('ม.4')} className={`flex-1 py-4 font-bold text-lg transition ${activeTab==='ม.4' ? 'bg-pink-50 text-pink-700 border-b-2 border-pink-600' : 'text-gray-500 hover:bg-gray-50'}`}>
                                    รายชื่อผู้สมัคร ม.4 <span className="ml-2 bg-gray-200 text-gray-700 text-xs px-2 py-1 rounded-full">{students.filter(s=>s.Level==='ม.4').length}</span>
                                </button>
                            </div>
                            
                            {/* Toolbar */}
                            <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
                                <div className="text-sm text-gray-600">
                                    <i className="fas fa-info-circle mr-1"></i> แสดงข้อมูลผู้สมัครล่าสุด
                                </div>
                                <button onClick={fetchStudents} className="text-blue-600 hover:text-blue-800 bg-white border border-blue-200 px-3 py-1.5 rounded shadow-sm text-sm">
                                    <i className="fas fa-sync-alt mr-1"></i> โหลดข้อมูลใหม่
                                </button>
                            </div>

                            {/* Data Table */}
                            <div className="overflow-x-auto">
                                {loadingAdmin ? (
                                    <div className="text-center py-20">
                                        <i className="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
                                        <p className="text-gray-500">กำลังดึงข้อมูลจากระบบ...</p>
                                    </div>
                                ) : (
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-100 text-gray-700 text-sm">
                                            <th className="p-4 border-b font-semibold">เลขบัตรประชาชน</th>
                                            <th className="p-4 border-b font-semibold">ชื่อ-นามสกุล</th>
                                            <th className="p-4 border-b font-semibold">เบอร์โทรติดต่อ</th>
                                            <th className="p-4 border-b font-semibold text-center">ไฟล์ที่อัพโหลด</th>
                                            <th className="p-4 border-b font-semibold text-center">จัดการ</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredStudents.length === 0 ? 
                                            <tr><td colSpan="5" className="text-center p-10 text-gray-500">ยังไม่มีข้อมูลผู้สมัครในระดับชั้นนี้</td></tr> : 
                                            filteredStudents.map((s, idx) => (
                                            <tr key={idx} className="hover:bg-gray-50 border-b transition">
                                                <td className="p-4 font-mono text-sm">{s['ID Card']}</td>
                                                <td className="p-4 font-medium">{s.Prefix}{s.Firstname} {s.Lastname}</td>
                                                <td className="p-4 text-sm">{s.Mobile}</td>
                                                <td className="p-4 text-center">
                                                    {s['Folder URL'] ? (
                                                        <a href={s['Folder URL']} target="_blank" rel="noopener noreferrer" title="เปิดโฟลเดอร์ Google Drive ในแท็บใหม่" className="inline-flex items-center justify-center bg-blue-50 text-blue-700 border border-blue-200 px-4 py-2 rounded-lg text-sm hover:bg-blue-600 hover:text-white transition font-medium shadow-sm">
                                                            <i className="fab fa-google-drive mr-2 text-lg"></i> เปิดโฟลเดอร์
                                                        </a>
                                                    ) : (
                                                        <span className="text-gray-400 text-sm bg-gray-100 px-3 py-1.5 rounded">ไม่มีไฟล์</span>
                                                    )}
                                                </td>
                                                <td className="p-4 text-center">
                                                    <button onClick={() => setSelectedStudent(s)} className="inline-flex items-center justify-center bg-indigo-50 text-indigo-700 border border-indigo-200 px-3 py-1.5 rounded-lg text-sm hover:bg-indigo-600 hover:text-white transition font-medium shadow-sm">
                                                        <i className="fas fa-search mr-1"></i> ดูข้อมูล
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Modal ดูข้อมูลผู้สมัคร */}
                    {selectedStudent && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col animate-fade-in-up">
                                <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-5 flex justify-between items-center text-white rounded-t-2xl shrink-0">
                                    <h2 className="text-xl font-bold"><i className="fas fa-user-graduate mr-2"></i> ข้อมูลผู้สมัครเรียน</h2>
                                    <button onClick={() => setSelectedStudent(null)} className="text-white hover:text-gray-200 bg-white/20 hover:bg-white/40 rounded-full w-8 h-8 flex items-center justify-center transition">
                                        <i className="fas fa-times"></i>
                                    </button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto bg-gray-50 flex-1">
                                    {/* Summary Section */}
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-6 flex flex-col md:flex-row gap-6 items-center md:items-start">
                                        <div className="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center text-blue-500 text-4xl shrink-0">
                                            <i className="fas fa-user"></i>
                                        </div>
                                        <div className="flex-1 w-full text-center md:text-left">
                                            <h3 className="text-2xl font-bold text-gray-800 mb-2">{selectedStudent.Prefix || ''}{selectedStudent.Firstname || ''} {selectedStudent.Lastname || ''}</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-y-2 text-gray-600 text-sm md:text-base">
                                                <p><i className="fas fa-id-card mr-2 w-5 text-center"></i> <b>เลขบัตรประชาชน:</b> {selectedStudent['ID Card'] || '-'}</p>
                                                <p><i className="fas fa-layer-group mr-2 w-5 text-center"></i> <b>ระดับชั้น:</b> <span className="text-blue-600 font-bold">{selectedStudent.Level || '-'}</span></p>
                                                <p><i className="fas fa-phone mr-2 w-5 text-center"></i> <b>เบอร์โทรติดต่อ:</b> {selectedStudent.Mobile || selectedStudent.mobile || '-'}</p>
                                                <p><i className="fas fa-calendar-alt mr-2 w-5 text-center"></i> <b>วันที่สมัคร:</b> {selectedStudent.Timestamp ? new Date(selectedStudent.Timestamp).toLocaleString('th-TH') : '-'}</p>
                                            </div>
                                        </div>
                                        <div className="shrink-0 w-full md:w-auto">
                                            {selectedStudent['Folder URL'] && (
                                                <a href={selectedStudent['Folder URL']} target="_blank" rel="noopener noreferrer" className="bg-green-50 text-green-700 border border-green-200 px-4 py-3 rounded-xl hover:bg-green-600 hover:text-white transition text-center font-bold flex items-center justify-center shadow-sm w-full">
                                                    <i className="fab fa-google-drive mr-2 text-xl"></i> เปิดแฟ้มเอกสาร
                                                </a>
                                            )}
                                        </div>
                                    </div>

                                    {/* All Data Section */}
                                    <h4 className="font-bold text-gray-800 mb-4 border-b pb-2 text-lg"><i className="fas fa-list-alt mr-2 text-blue-500"></i> ข้อมูลการสมัครทั้งหมด</h4>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {Object.entries(selectedStudent).map(([key, value]) => {
                                            if (key === 'Folder URL' || key === 'Timestamp') return null;
                                            return (
                                                <div key={key} className="bg-white p-3 rounded-lg border border-gray-100 shadow-sm hover:border-blue-200 transition">
                                                    <div className="text-xs text-gray-500 mb-1">{key}</div>
                                                    <div className="font-medium text-gray-800 break-words">{value ? value.toString() : <span className="text-gray-300">-</span>}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                
                                <div className="p-4 border-t bg-white rounded-b-2xl flex justify-end shrink-0">
                                    <button onClick={() => setSelectedStudent(null)} className="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold hover:bg-gray-300 transition shadow-sm">
                                        <i className="fas fa-times mr-2"></i> ปิดหน้าต่าง
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
