<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการผู้สมัครเรียน - แอดมิน</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .modal-scroll::-webkit-scrollbar { width: 6px; }
        .modal-scroll::-webkit-scrollbar-track { background: #f1f1f1; rounded: 8px;}
        .modal-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .modal-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // URL ของ Google Apps Script (ตัวเดียวกับ index.html)
        // ==========================================
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbysA9t7bYvlDlOwBb-6vJCi7HbGrGoWaylKNzT63qrzTNgfcyBIf5eSS4vZd-s33lNq/exec"; 
        const ADMIN_PASSWORD = "admin"; // ตั้งรหัสผ่านเข้าหน้าแอดมินที่นี่

        const { useState, useEffect, useMemo } = React;

        const AdminApp = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [students, setStudents] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedStudent, setSelectedStudent] = useState(null);

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === ADMIN_PASSWORD) {
                    setIsAuthenticated(true);
                    fetchData();
                } else {
                    alert("รหัสผ่านไม่ถูกต้อง");
                }
            };

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(GAS_WEBAPP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'get_students' })
                    });
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        // กรองเอาเฉพาะแถวที่มีข้อมูล (เช็คจาก ID Card ไม่ว่างเปล่า)
                        const validData = result.data.filter(s => s['ID Card'] && String(s['ID Card']).trim() !== '');
                        // เรียงข้อมูลล่าสุดขึ้นก่อน (ถ้า Timestamp มี)
                        validData.reverse(); 
                        setStudents(validData);
                    } else {
                        alert("เกิดข้อผิดพลาดในการดึงข้อมูล: " + result.message);
                    }
                } catch (error) {
                    console.error("Fetch Error", error);
                    alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบ");
                }
                setIsLoading(false);
            };

            // กรองข้อมูลตามคำค้นหา
            const filteredStudents = useMemo(() => {
                if (!searchTerm) return students;
                const lowerSearch = searchTerm.toLowerCase();
                return students.filter(s => 
                    String(s['Firstname'] || '').toLowerCase().includes(lowerSearch) ||
                    String(s['Lastname'] || '').toLowerCase().includes(lowerSearch) ||
                    String(s['ID Card'] || '').includes(lowerSearch)
                );
            }, [students, searchTerm]);

            // คำนวณสถิติ
            const stats = useMemo(() => {
                return {
                    total: students.length,
                    m1: students.filter(s => s['Level'] === 'ม.1').length,
                    m4: students.filter(s => s['Level'] === 'ม.4').length
                };
            }, [students]);

            const formatDate = (dateStr) => {
                if (!dateStr) return '-';
                try {
                    const d = new Date(dateStr);
                    if(isNaN(d.getTime())) return dateStr;
                    return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                } catch(e) { return dateStr; }
            };

            // Component สำหรับแสดงหน้า Login
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100 px-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center">
                            <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i className="fas fa-user-shield text-blue-600 text-3xl"></i>
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">ระบบจัดการผู้สมัคร</h2>
                            <p className="text-gray-500 text-sm mb-6">กรุณาใส่รหัสผ่านเพื่อเข้าสู่ระบบ</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    type="password" 
                                    value={passwordInput} 
                                    onChange={(e) => setPasswordInput(e.target.value)} 
                                    placeholder="รหัสผ่านแอดมิน" 
                                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-center text-lg tracking-widest"
                                    required
                                />
                                <button type="submit" className="w-full py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition shadow-md">
                                    เข้าสู่ระบบ <i className="fas fa-sign-in-alt ml-2"></i>
                                </button>
                            </form>
                            <div className="mt-6">
                                <a href="index.html" className="text-sm text-gray-400 hover:text-gray-600 underline"><i className="fas fa-arrow-left mr-1"></i> กลับหน้าสมัครเรียน</a>
                            </div>
                        </div>
                    </div>
                );
            }

            // Component สำหรับแสดงรายละเอียดเต็ม (Modal)
            const StudentModal = ({ student, onClose }) => {
                if (!student) return null;
                
                const InfoRow = ({ label, value, span=1 }) => (
                    <div className={`col-span-1 ${span === 2 ? 'md:col-span-2' : ''} border-b border-gray-100 pb-2`}>
                        <span className="block text-xs text-gray-500 mb-1">{label}</span>
                        <span className="font-medium text-gray-800">{value || '-'}</span>
                    </div>
                );

                return (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden animate-fade-in-up">
                            {/* Header */}
                            <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 flex justify-between items-center text-white shrink-0">
                                <div>
                                    <h2 className="text-xl font-bold">ข้อมูลผู้สมัคร: {student['Firstname']} {student['Lastname']}</h2>
                                    <p className="text-blue-100 text-sm">เลขบัตรประชาชน: {student['ID Card']} | สมัครเมื่อ: {formatDate(student['Timestamp'])}</p>
                                </div>
                                <button onClick={onClose} className="w-10 h-10 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center transition">
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                            </div>
                            
                            {/* Body (Scrollable) */}
                            <div className="p-6 overflow-y-auto modal-scroll bg-gray-50 flex-1">
                                
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    {/* คอลัมน์ซ้าย: ข้อมูลหลัก */}
                                    <div className="lg:col-span-2 space-y-6">
                                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i className="fas fa-user text-blue-500 mr-2"></i>ข้อมูลส่วนตัว</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                                <InfoRow label="ระดับชั้นที่สมัคร" value={student['Level']} />
                                                <InfoRow label="คำนำหน้า" value={student['Prefix']} />
                                                <InfoRow label="เพศ" value={student['Gender']} />
                                                <InfoRow label="ชื่อ" value={student['Firstname']} />
                                                <InfoRow label="นามสกุล" value={student['Lastname']} />
                                                <InfoRow label="ชื่อเล่น" value={student['Nickname']} />
                                                <InfoRow label="วันเกิด" value={student['DOB'] ? new Date(student['DOB']).toLocaleDateString('th-TH') : '-'} />
                                                <InfoRow label="อายุ" value={student['Age'] ? `${student['Age']} ปี` : '-'} />
                                                <InfoRow label="สัญชาติ/เชื้อชาติ/ศาสนา" value={`${student['Nationality'] || '-'} / ${student['Race'] || '-'} / ${student['Religion'] || '-'}`} span={2} />
                                            </div>
                                        </div>

                                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i className="fas fa-graduation-cap text-blue-500 mr-2"></i>ข้อมูลการศึกษาเดิม</h3>
                                            <div className="grid grid-cols-2 gap-4">
                                                <InfoRow label="โรงเรียนเดิม" value={student['Prev School']} />
                                                <InfoRow label="จังหวัด" value={student['Prev School Province']} />
                                                <InfoRow label="ชั้นเรียนสุดท้าย" value={student['Last Grade']} />
                                                <InfoRow label="เหตุผลที่ออก" value={student['Leave Reason']} />
                                            </div>
                                        </div>

                                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i className="fas fa-home text-blue-500 mr-2"></i>ที่อยู่และการติดต่อ</h3>
                                            <div className="grid grid-cols-2 gap-4">
                                                <InfoRow label="ที่อยู่ปัจจุบัน" value={`${student['Address']} ม.${student['Moo']} ถ.${student['Road']}`} span={2} />
                                                <InfoRow label="ตำบล / อำเภอ" value={`${student['Subdistrict']} / ${student['District']}`} />
                                                <InfoRow label="จังหวัด / รหัสไปรษณีย์" value={`${student['Province']} ${student['Zipcode']}`} />
                                                <InfoRow label="โทรศัพท์มือถือ" value={student['Mobile']} />
                                                <InfoRow label="โทรศัพท์บ้าน" value={student['Home Phone']} />
                                            </div>
                                        </div>

                                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i className="fas fa-users text-blue-500 mr-2"></i>ข้อมูลครอบครัว</h3>
                                            <div className="grid grid-cols-2 gap-x-4 gap-y-6">
                                                <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                                                    <h4 className="font-bold text-blue-700 text-sm mb-2">บิดา</h4>
                                                    <InfoRow label="ชื่อ-สกุล" value={student['Father Name']} />
                                                    <InfoRow label="อาชีพ / รายได้" value={`${student['Father Job'] || '-'} (${student['Father Income'] || '-'})`} />
                                                    <InfoRow label="เบอร์โทรศัพท์" value={student['Father Phone']} />
                                                </div>
                                                <div className="bg-pink-50 p-3 rounded-lg border border-pink-100">
                                                    <h4 className="font-bold text-pink-700 text-sm mb-2">มารดา</h4>
                                                    <InfoRow label="ชื่อ-สกุล" value={student['Mother Name']} />
                                                    <InfoRow label="อาชีพ / รายได้" value={`${student['Mother Job'] || '-'} (${student['Mother Income'] || '-'})`} />
                                                    <InfoRow label="เบอร์โทรศัพท์" value={student['Mother Phone']} />
                                                </div>
                                                <div className="col-span-2">
                                                    <InfoRow label="สถานภาพบิดา-มารดา" value={student['Parents Status']} />
                                                </div>
                                                <div className="bg-green-50 p-3 rounded-lg border border-green-100 col-span-2 grid grid-cols-2 gap-2">
                                                    <h4 className="font-bold text-green-700 text-sm mb-2 col-span-2">ผู้ปกครอง</h4>
                                                    <InfoRow label="ชื่อ-สกุล" value={student['Guardian Name']} />
                                                    <InfoRow label="ความเกี่ยวข้อง" value={student['Guardian Relation']} />
                                                    <InfoRow label="เบอร์โทรศัพท์" value={student['Guardian Phone']} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* คอลัมน์ขวา: เอกสารแนบ */}
                                    <div className="space-y-4">
                                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 sticky top-0">
                                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i className="fas fa-folder-open text-yellow-500 mr-2"></i>เอกสารแนบ</h3>
                                            
                                            {student['Folder URL'] ? (
                                                <a href={student['Folder URL']} target="_blank" rel="noreferrer" className="w-full mb-4 flex items-center justify-center gap-2 py-3 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded-lg font-medium transition border border-blue-200">
                                                    <i className="fab fa-google-drive text-xl"></i> เปิดโฟลเดอร์ Drive รวม
                                                </a>
                                            ) : (
                                                <div className="w-full mb-4 flex items-center justify-center gap-2 py-3 bg-gray-100 text-gray-500 rounded-lg font-medium border border-gray-200">
                                                    <i className="fas fa-exclamation-circle"></i> ไม่พบโฟลเดอร์เอกสาร
                                                </div>
                                            )}

                                            <div className="space-y-3">
                                                {['Birth Cert URL', 'ID Card Doc URL', 'House Reg URL', 'Photo URL', 'Transcript URL'].map(key => {
                                                    const labels = {
                                                        'Birth Cert URL': 'สูติบัตร',
                                                        'ID Card Doc URL': 'บัตรประชาชน',
                                                        'House Reg URL': 'ทะเบียนบ้าน',
                                                        'Photo URL': 'รูปถ่าย',
                                                        'Transcript URL': 'ปพ.1'
                                                    };
                                                    const url = student[key];
                                                    return (
                                                        <div key={key} className="flex items-center justify-between p-3 border border-gray-100 rounded-lg bg-gray-50 hover:bg-white transition">
                                                            <span className="text-sm font-medium text-gray-700">{labels[key]}</span>
                                                            {url ? (
                                                                <a href={url} target="_blank" rel="noreferrer" className="text-xs bg-indigo-500 text-white px-3 py-1.5 rounded-full hover:bg-indigo-600 transition shadow-sm">
                                                                    ดูไฟล์
                                                                </a>
                                                            ) : (
                                                                <span className="text-xs bg-gray-200 text-gray-500 px-3 py-1.5 rounded-full">ไม่มีไฟล์</span>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navbar */}
                    <nav className="bg-white shadow-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-md">
                                <i className="fas fa-shield-alt text-white text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-gray-800 leading-tight">ระบบผู้ดูแล (Admin)</h1>
                                <p className="text-xs text-gray-500">โรงเรียนปากแพรกวิทยาคม</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={fetchData} className="w-10 h-10 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 hover:text-blue-600 transition flex items-center justify-center shadow-sm" title="รีเฟรชข้อมูล">
                                <i className={`fas fa-sync-alt ${isLoading ? 'fa-spin' : ''}`}></i>
                            </button>
                            <a href="index.html" className="text-sm bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2 rounded-lg font-medium transition border border-red-100">
                                <i className="fas fa-sign-out-alt mr-2"></i>ออกจากระบบ
                            </a>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <div className="flex-1 p-6 max-w-7xl mx-auto w-full">
                        
                        {/* Stats Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                                <div className="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center shrink-0">
                                    <i className="fas fa-users text-blue-600 text-2xl"></i>
                                </div>
                                <div>
                                    <p className="text-sm text-gray-500 font-medium">ผู้สมัครทั้งหมด</p>
                                    <h3 className="text-3xl font-bold text-gray-800">{stats.total} <span className="text-sm font-normal text-gray-500">คน</span></h3>
                                </div>
                            </div>
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                                <div className="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center shrink-0">
                                    <i className="fas fa-child text-green-600 text-2xl"></i>
                                </div>
                                <div>
                                    <p className="text-sm text-gray-500 font-medium">สมัครชั้น ม.1</p>
                                    <h3 className="text-3xl font-bold text-gray-800">{stats.m1} <span className="text-sm font-normal text-gray-500">คน</span></h3>
                                </div>
                            </div>
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex items-center gap-4">
                                <div className="w-14 h-14 bg-pink-100 rounded-full flex items-center justify-center shrink-0">
                                    <i className="fas fa-user-graduate text-pink-600 text-2xl"></i>
                                </div>
                                <div>
                                    <p className="text-sm text-gray-500 font-medium">สมัครชั้น ม.4</p>
                                    <h3 className="text-3xl font-bold text-gray-800">{stats.m4} <span className="text-sm font-normal text-gray-500">คน</span></h3>
                                </div>
                            </div>
                        </div>

                        {/* Data Table Section */}
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
                            {/* Toolbar */}
                            <div className="p-4 border-b border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4 bg-gray-50">
                                <h2 className="text-lg font-bold text-gray-800 flex items-center"><i className="fas fa-list-alt text-gray-400 mr-2"></i> รายชื่อผู้สมัครเรียน</h2>
                                <div className="relative w-full sm:w-72">
                                    <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input 
                                        type="text" 
                                        placeholder="ค้นหา ชื่อ, นามสกุล, เลขบัตร..." 
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm"
                                    />
                                </div>
                            </div>

                            {/* Table */}
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[800px]">
                                    <thead>
                                        <tr className="bg-gray-100 text-gray-600 text-sm border-b border-gray-200">
                                            <th className="p-4 font-semibold w-16 text-center">ลำดับ</th>
                                            <th className="p-4 font-semibold">วันเวลาที่สมัคร</th>
                                            <th className="p-4 font-semibold">เลขบัตรประชาชน</th>
                                            <th className="p-4 font-semibold">ชื่อ-สกุล</th>
                                            <th className="p-4 font-semibold text-center">ระดับชั้น</th>
                                            <th className="p-4 font-semibold">เบอร์โทรติดต่อ</th>
                                            <th className="p-4 font-semibold text-center">เอกสาร</th>
                                            <th className="p-4 font-semibold text-center w-24">จัดการ</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {isLoading ? (
                                            <tr>
                                                <td colSpan="8" className="p-12 text-center text-gray-500">
                                                    <i className="fas fa-spinner fa-spin text-3xl mb-4 text-blue-500"></i>
                                                    <p>กำลังโหลดข้อมูล...</p>
                                                </td>
                                            </tr>
                                        ) : filteredStudents.length === 0 ? (
                                            <tr>
                                                <td colSpan="8" className="p-12 text-center text-gray-500">
                                                    <div className="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-3">
                                                        <i className="fas fa-inbox text-2xl text-gray-400"></i>
                                                    </div>
                                                    <p>ไม่พบข้อมูลผู้สมัคร</p>
                                                </td>
                                            </tr>
                                        ) : (
                                            filteredStudents.map((student, index) => (
                                                <tr key={index} className="hover:bg-blue-50/50 transition duration-150">
                                                    <td className="p-4 text-center text-gray-500 text-sm">{index + 1}</td>
                                                    <td className="p-4 text-sm text-gray-600">{formatDate(student['Timestamp'])}</td>
                                                    <td className="p-4 font-mono text-sm text-gray-700">{student['ID Card']}</td>
                                                    <td className="p-4 font-medium text-gray-800">
                                                        {student['Prefix']} {student['Firstname']} {student['Lastname']}
                                                        {student['Nickname'] && <span className="text-gray-400 font-normal text-xs ml-2">({student['Nickname']})</span>}
                                                    </td>
                                                    <td className="p-4 text-center">
                                                        <span className={`inline-block px-3 py-1 text-xs font-bold rounded-full ${student['Level'] === 'ม.1' ? 'bg-green-100 text-green-700' : 'bg-pink-100 text-pink-700'}`}>
                                                            {student['Level']}
                                                        </span>
                                                    </td>
                                                    <td className="p-4 text-sm text-gray-600">{student['Mobile']}</td>
                                                    <td className="p-4 text-center">
                                                        {student['Folder URL'] ? (
                                                            <a href={student['Folder URL']} target="_blank" rel="noreferrer" className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-blue-100 text-blue-600 hover:bg-blue-200 transition" title="เปิดโฟลเดอร์ Google Drive">
                                                                <i className="fab fa-google-drive"></i>
                                                            </a>
                                                        ) : (
                                                            <span className="text-gray-300" title="ไม่มีโฟลเดอร์"><i className="fas fa-folder"></i></span>
                                                        )}
                                                    </td>
                                                    <td className="p-4 text-center">
                                                        <button 
                                                            onClick={() => setSelectedStudent(student)}
                                                            className="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 hover:text-blue-600 px-3 py-1.5 rounded shadow-sm text-xs font-medium transition"
                                                        >
                                                            ดูข้อมูล
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                            <div className="p-4 bg-gray-50 border-t border-gray-200 text-xs text-gray-500 text-right">
                                แสดงข้อมูลทั้งหมด {filteredStudents.length} รายการ
                            </div>
                        </div>

                    </div>
                    
                    {/* Render Modal */}
                    <StudentModal student={selectedStudent} onClose={() => setSelectedStudent(null)} />
                    
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
