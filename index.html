<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแบบฟอร์มออนไลน์</title>
    
    <!-- นำเข้า React และ Babel -->
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า FontAwesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- นำเข้า Font พรอมต์ (Prompt) -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ตั้งค่า Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .form-section-title { font-size: 1.25rem; font-weight: 700; color: #1e40af; border-bottom: 2px solid #bfdbfe; padding-bottom: 0.5rem; margin-bottom: 1.5rem; margin-top: 2rem; display: flex; align-items: center; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 📌 ใส่ URL ของ Google Apps Script (Web App) ของคุณที่นี่
        const GAS_WEBAPP_URL = 'ใส่_URL_WEB_APP_ของคุณที่นี่';

        function App() {
            const [step, setStep] = useState(1);
            const [isLoading, setIsLoading] = useState(false);
            const [alertMsg, setAlertMsg] = useState({ type: '', text: '' });
            
            // ข้อมูลฟอร์มตั้งต้น (สามารถแก้ไข Key และ Value ให้ตรงกับงานได้)
            const [formData, setFormData] = useState({
                reporterName: '',
                role: 'นักเรียน',
                subject: '',
                category: 'แจ้งปัญหา',
                date: '',
                details: ''
            });

            const [file, setFile] = useState(null);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleFileChange = (e) => {
                if (e.target.files.length > 0) {
                    const selectedFile = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const base64 = event.target.result.split(',')[1];
                        setFile({ 
                            base64: base64, 
                            mimeType: selectedFile.type, 
                            filename: selectedFile.name 
                        });
                    };
                    reader.readAsDataURL(selectedFile);
                }
            };

            const showAlert = (type, text) => {
                setAlertMsg({ type, text });
                setTimeout(() => setAlertMsg({ type: '', text: '' }), 6000);
            };

            const submitForm = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                
                try {
                    // สร้าง Payload เพื่อส่งไปที่ Google Apps Script
                    const payload = { 
                        action: 'submit_data', 
                        data: formData, 
                        file: file 
                    };
                    
                    /* // โค้ดสำหรับส่งจริง (เปิดคอมเมนต์เมื่อมี URL)
                    const res = await fetch(GAS_WEBAPP_URL, { 
                        method: 'POST', 
                        body: JSON.stringify(payload) 
                    });
                    const result = await res.json();
                    */

                    // จำลองการส่งข้อมูล (ลบออกได้เมื่อใช้งานจริง)
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    showAlert('success', 'บันทึกข้อมูลเข้าสู่ระบบเรียบร้อยแล้ว!');
                    setStep(2); // ไปหน้าสำเร็จ

                } catch (error) {
                    showAlert('error', 'เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้ง');
                }
                
                setIsLoading(false);
            };

            return (
                <div className="min-h-screen pb-12 font-sans">
                    {/* ส่วนหัว Header */}
                    <div className="bg-gradient-to-r from-blue-700 to-indigo-600 text-white py-12 shadow-lg mb-8 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full bg-black opacity-10"></div>
                        <div className="max-w-4xl mx-auto px-4 text-center relative z-10">
                            <h1 className="text-3xl md:text-5xl font-bold mb-3 drop-shadow-md">ระบบบันทึกข้อมูลออนไลน์</h1>
                            <p className="text-blue-100 text-lg md:text-xl font-light">กรอกรายละเอียดด้านล่างให้ครบถ้วนเพื่อดำเนินการ</p>
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto px-4">
                        {/* กล่องข้อความแจ้งเตือน */}
                        {alertMsg.text && (
                            <div className={`p-4 mb-6 rounded-lg text-white font-medium shadow-md animate-fade-in-up flex items-center ${alertMsg.type === 'error' ? 'bg-red-500' : alertMsg.type === 'success' ? 'bg-green-500' : 'bg-blue-500'}`}>
                                <i className={`mr-3 text-xl ${alertMsg.type === 'error' ? 'fas fa-exclamation-circle' : alertMsg.type === 'success' ? 'fas fa-check-circle' : 'fas fa-info-circle'}`}></i>
                                {alertMsg.text}
                            </div>
                        )}

                        {/* ขั้นตอนที่ 1: ฟอร์มกรอกข้อมูล */}
                        {step === 1 && (
                            <div className="bg-white rounded-2xl shadow-2xl overflow-hidden animate-fade-in-up border-t-4 border-blue-500 p-6 md:p-10 relative">
                                
                                {isLoading && (
                                    <div className="absolute inset-0 bg-white bg-opacity-80 z-50 flex flex-col items-center justify-center rounded-2xl">
                                        <i className="fas fa-circle-notch fa-spin text-5xl text-blue-500 mb-4"></i>
                                        <p className="text-xl font-bold text-blue-800">กำลังบันทึกข้อมูล...</p>
                                    </div>
                                )}
                                
                                <form onSubmit={submitForm}>
                                    
                                    {/* ส่วนที่ 1: ข้อมูลทั่วไป */}
                                    <h3 className="form-section-title"><i className="fas fa-user mr-3 text-blue-500"></i> 1. ข้อมูลผู้บันทึก</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                                        <div>
                                            <label className="block text-gray-700 text-sm font-semibold mb-1">ชื่อ-นามสกุล <span className="text-red-500">*</span></label>
                                            <input type="text" name="reporterName" value={formData.reporterName} onChange={handleInputChange} required 
                                                className="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" placeholder="ระบุชื่อและนามสกุล" />
                                        </div>
                                        <div>
                                            <label className="block text-gray-700 text-sm font-semibold mb-1">สถานะ / ตำแหน่ง</label>
                                            <select name="role" value={formData.role} onChange={handleInputChange} 
                                                className="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                                                <option value="นักเรียน">นักเรียน</option>
                                                <option value="ครู/บุคลากร">ครู / บุคลากร</option>
                                                <option value="ผู้ปกครอง">ผู้ปกครอง</option>
                                                <option value="บุคคลทั่วไป">บุคคลทั่วไป</option>
                                            </select>
                                        </div>
                                    </div>

                                    {/* ส่วนที่ 2: รายละเอียด */}
                                    <h3 className="form-section-title"><i className="fas fa-edit mr-3 text-blue-500"></i> 2. รายละเอียดข้อมูล</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                                        <div>
                                            <label className="block text-gray-700 text-sm font-semibold mb-1">หัวข้อเรื่อง <span className="text-red-500">*</span></label>
                                            <input type="text" name="subject" value={formData.subject} onChange={handleInputChange} required 
                                                className="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" placeholder="ระบุหัวข้อที่ต้องการแจ้ง" />
                                        </div>
                                        <div>
                                            <label className="block text-gray-700 text-sm font-semibold mb-1">หมวดหมู่</label>
                                            <select name="category" value={formData.category} onChange={handleInputChange} 
                                                className="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                                                <option value="แจ้งปัญหา">แจ้งปัญหา / ข้อร้องเรียน</option>
                                                <option value="รายงานพฤติกรรม">รายงานพฤติกรรม</option>
                                                <option value="แจ้งซ่อม">แจ้งซ่อมอุปกรณ์</option>
                                                <option value="เสนอแนะ">ข้อเสนอแนะ</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="mb-5">
                                        <label className="block text-gray-700 text-sm font-semibold mb-1">วันที่เกิดเหตุ / วันที่ดำเนินการ <span className="text-red-500">*</span></label>
                                        <input type="date" name="date" value={formData.date} onChange={handleInputChange} required 
                                            className="w-full md:w-1/2 p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" />
                                    </div>
                                    <div className="mb-6">
                                        <label className="block text-gray-700 text-sm font-semibold mb-1">รายละเอียดเพิ่มเติม</label>
                                        <textarea name="details" value={formData.details} onChange={handleInputChange} rows="4" 
                                            className="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" placeholder="อธิบายรายละเอียดเพิ่มเติมที่นี่..."></textarea>
                                    </div>

                                    {/* ส่วนที่ 3: เอกสารแนบ */}
                                    <h3 className="form-section-title"><i className="fas fa-paperclip mr-3 text-blue-500"></i> 3. รูปภาพ / เอกสารอ้างอิง</h3>
                                    <div className="mb-8 bg-blue-50 p-6 rounded-xl border border-blue-100 shadow-sm">
                                        <label className="block text-blue-800 text-sm font-bold mb-2">อัปโหลดไฟล์ (ถ้ามี)</label>
                                        <input type="file" onChange={handleFileChange} 
                                            className="w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer transition-all" />
                                        <p className="text-xs text-gray-500 mt-2">รองรับไฟล์รูปภาพ (JPG, PNG) หรือเอกสาร (PDF)</p>
                                    </div>

                                    {/* ปุ่ม Submit */}
                                    <div className="mt-10 pt-6 border-t flex justify-end">
                                        <button type="submit" disabled={isLoading} 
                                            className="px-8 py-4 bg-blue-600 text-white rounded-xl font-bold text-lg hover:bg-blue-700 shadow-lg hover:shadow-xl transition-all w-full md:w-auto flex justify-center items-center">
                                            <i className="fas fa-paper-plane mr-2"></i> ส่งข้อมูล
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}

                        {/* ขั้นตอนที่ 2: หน้าต่างสำเร็จ */}
                        {step === 2 && (
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden animate-fade-in-up border-t-8 border-green-500 p-10 text-center max-w-lg mx-auto">
                                <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i className="fas fa-check text-5xl text-green-500"></i>
                                </div>
                                <h2 className="text-3xl font-bold text-gray-800 mb-3">บันทึกข้อมูลสำเร็จ!</h2>
                                <p className="text-gray-600 mb-8 text-lg">ข้อมูลของคุณถูกส่งเข้าระบบเรียบร้อยแล้ว ขอบคุณที่ให้ความร่วมมือครับ</p>
                                <button onClick={() => { setStep(1); setFormData({...formData, subject:'', details:''}); setFile(null); }} 
                                    className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg hover:bg-blue-700 shadow-md transition-all">
                                    <i className="fas fa-plus-circle mr-2"></i> บันทึกข้อมูลรายการใหม่
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
