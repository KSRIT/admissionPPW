<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรับสมัครนักเรียน ออนไลน์ โรงเรียนปากแพรกวิทยาคม</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Sarabun (Official Thai Font) -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0fdfa; }
        /* Custom Colors based on request (Blue, Pink, White) */
        .bg-theme-blue { background-color: #0ea5e9; }
        .text-theme-blue { color: #0ea5e9; }
        .bg-theme-pink { background-color: #ec4899; }
        .text-theme-pink { color: #ec4899; }
        .border-theme-pink { border-color: #ec4899; }
        
        /* Print Styles */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-container { width: 100%; margin: 0; padding: 0; box-shadow: none; }
            .page-break { page-break-before: always; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // ตั้งค่า URL ของ Google Apps Script ที่ Deploy แล้ว
        // ==========================================
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbysA9t7bYvlDlOwBb-6vJCi7HbGrGoWaylKNzT63qrzTNgfcyBIf5eSS4vZd-s33lNq/exec"; 
        
        const { useState, useEffect } = React;

        const App = () => {
            const [step, setStep] = useState(1);
            const [isLoading, setIsLoading] = useState(false);
            const [formData, setFormData] = useState({
                idCard: '', dob: '', level: 'ม.1',
                prefix: '', firstname: '', lastname: '', gender: '', nationality: 'ไทย', religion: 'พุทธ', talent: '', disability: '',
                address: '', moo: '', road: '', province: '', district: '', subdistrict: '', homePhone: '', mobile: '', email: '',
                prevSchool: '', gpa: '', gradYear: ''
            });
            const [files, setFiles] = useState({
                birthCert: null, idCardDoc: null, houseReg: null, photo: null, transcript: null
            });
            const [viewMode, setViewMode] = useState('user'); // 'user' or 'admin'

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleFileChange = (e) => {
                const { name, files: selectedFiles } = e.target;
                if (selectedFiles.length > 0) {
                    const file = selectedFiles[0];
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64String = reader.result.split(',')[1];
                        setFiles(prev => ({
                            ...prev,
                            [name]: {
                                base64: base64String,
                                mimeType: file.type,
                                extension: file.name.split('.').pop()
                            }
                        }));
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Step 1: Check Data
            const checkData = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    // จำลองการตรวจสอบ (เนื่องจากยังไม่มี GAS URL จริงในระบบตัวอย่าง)
                    if(GAS_WEBAPP_URL === "https://script.google.com/macros/s/AKfycbysA9t7bYvlDlOwBb-6vJCi7HbGrGoWaylKNzT63qrzTNgfcyBIf5eSS4vZd-s33lNq/exec") {
                        setTimeout(() => {
                            setIsLoading(false);
                            // จำลองว่าไม่พบข้อมูล ให้ไปต่อ step 2
                            setStep(2);
                        }, 1000);
                        return;
                    }

                    const response = await fetch(GAS_WEBAPP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'check_student', idCard: formData.idCard, dob: formData.dob })
                    });
                    const result = await response.json();
                    
                    if (result.status === 'found') {
                        setFormData(result.data); // Load existing data
                        setStep(4); // Go to display page
                    } else {
                        setStep(2); // Go to register page
                    }
                } catch (error) {
                    console.error("Error checking data", error);
                    alert("ไม่สามารถเชื่อมต่อระบบได้ จะดำเนินการไปขั้นตอนต่อไปชั่วคราว");
                    setStep(2);
                }
                setIsLoading(false);
            };

            // Step 2 -> 3 Transition
            const validateStep2 = (e) => {
                e.preventDefault();
                const gpa = parseFloat(formData.gpa);
                if (isNaN(gpa) || gpa < 1.00 || gpa > 4.00) {
                    alert("กรุณาระบุเกรดเฉลี่ยระหว่าง 1.00 - 4.00");
                    return;
                }
                if (window.confirm("กรุณาตรวจสอบข้อมูลของท่านให้เรียบร้อยก่อนทำการยืนยันข้อมูล\n\nยืนยันที่จะไปยังขั้นตอนอัพโหลดเอกสารใช่หรือไม่?")) {
                    setStep(3);
                }
            };

            // Step 3 -> Submit
            const submitApplication = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                
                const payload = {
                    action: 'submit_application',
                    ...formData,
                    files: files
                };

                try {
                    if(GAS_WEBAPP_URL === "https://script.google.com/macros/s/AKfycbysA9t7bYvlDlOwBb-6vJCi7HbGrGoWaylKNzT63qrzTNgfcyBIf5eSS4vZd-s33lNq/exec") {
                        setTimeout(() => {
                            setIsLoading(false);
                            setStep(4);
                        }, 1500);
                        return;
                    }

                    const response = await fetch(GAS_WEBAPP_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setStep(4);
                    } else {
                        alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล: " + result.message);
                    }
                } catch (error) {
                    console.error("Submit Error", error);
                    alert("บันทึกข้อมูลสำเร็จ (โหมดจำลอง)");
                    setStep(4);
                }
                setIsLoading(false);
            };

            // Component: Admin View
            const AdminPanel = () => {
                const [password, setPassword] = useState('');
                const [isAuthenticated, setIsAuthenticated] = useState(false);
                const [activeTab, setActiveTab] = useState('ม.1');
                const [students, setStudents] = useState([]);
                const [loadingAdmin, setLoadingAdmin] = useState(false);

                const login = (e) => {
                    e.preventDefault();
                    if (password === '640551') {
                        setIsAuthenticated(true);
                        fetchStudents();
                    } else {
                        alert('รหัสผ่านไม่ถูกต้อง');
                    }
                };

                const fetchStudents = async () => {
                    setLoadingAdmin(true);
                    if(GAS_WEBAPP_URL === "https://script.google.com/macros/s/AKfycbysA9t7bYvlDlOwBb-6vJCi7HbGrGoWaylKNzT63qrzTNgfcyBIf5eSS4vZd-s33lNq/exec") {
                         // Mock Data
                         setTimeout(() => {
                             setStudents([
                                 { Timestamp: '11/03/2026', Level: 'ม.1', Firstname: 'สมชาย', Lastname: 'ใจดี', 'ID Card': '1103700000000', 'Folder URL': '#' },
                                 { Timestamp: '11/03/2026', Level: 'ม.4', Firstname: 'สมหญิง', Lastname: 'รักเรียน', 'ID Card': '1103700000001', 'Folder URL': '#' }
                             ]);
                             setLoadingAdmin(false);
                         }, 1000);
                         return;
                    }

                    try {
                        const response = await fetch(`${GAS_WEBAPP_URL}?action=get_all`);
                        const result = await response.json();
                        if(result.status === 'success') {
                            setStudents(result.data);
                        }
                    } catch (e) {
                        console.log(e);
                    }
                    setLoadingAdmin(false);
                };

                if (!isAuthenticated) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-gray-100">
                            <form onSubmit={login} className="bg-white p-8 rounded-lg shadow-lg w-96">
                                <h2 className="text-2xl font-bold mb-6 text-center text-gray-800">ผู้ดูแลระบบ</h2>
                                <input type="password" placeholder="รหัสผ่าน" value={password} onChange={e=>setPassword(e.target.value)}
                                    className="w-full p-3 border rounded mb-4 focus:outline-none focus:border-blue-500" required/>
                                <button type="submit" className="w-full bg-gray-800 text-white p-3 rounded hover:bg-gray-900 transition">เข้าสู่ระบบ</button>
                                <button type="button" onClick={() => setViewMode('user')} className="w-full mt-2 text-gray-500 underline text-sm">กลับหน้าหลัก</button>
                            </form>
                        </div>
                    );
                }

                const filteredStudents = students.filter(s => s.Level === activeTab);

                return (
                    <div className="min-h-screen bg-gray-50 p-6">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-bold text-gray-800"><i className="fas fa-users-cog mr-2"></i> ระบบจัดการผู้สมัคร</h1>
                                <button onClick={() => setViewMode('user')} className="bg-red-500 text-white px-4 py-2 rounded shadow hover:bg-red-600">ออกจากระบบ</button>
                            </div>

                            <div className="bg-white rounded-lg shadow overflow-hidden">
                                <div className="flex border-b">
                                    <button onClick={()=>setActiveTab('ม.1')} className={`flex-1 py-4 font-semibold text-lg ${activeTab==='ม.1' ? 'bg-blue-50 text-blue-600 border-b-2 border-blue-500' : 'text-gray-500 hover:bg-gray-50'}`}>สมัคร ม.1</button>
                                    <button onClick={()=>setActiveTab('ม.4')} className={`flex-1 py-4 font-semibold text-lg ${activeTab==='ม.4' ? 'bg-pink-50 text-pink-600 border-b-2 border-pink-500' : 'text-gray-500 hover:bg-gray-50'}`}>สมัคร ม.4</button>
                                </div>
                                
                                <div className="p-6 overflow-x-auto">
                                    {loadingAdmin ? <p className="text-center py-10"><i className="fas fa-spinner fa-spin text-3xl text-gray-400"></i></p> : 
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-gray-100 text-gray-700">
                                                <th className="p-3 border-b">วันที่สมัคร</th>
                                                <th className="p-3 border-b">เลขบัตรประชาชน</th>
                                                <th className="p-3 border-b">ชื่อ-นามสกุล</th>
                                                <th className="p-3 border-b">สถานะเอกสาร</th>
                                                <th className="p-3 border-b text-center">จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filteredStudents.length === 0 ? 
                                                <tr><td colSpan="5" className="text-center p-6 text-gray-500">ไม่มีข้อมูล</td></tr> : 
                                                filteredStudents.map((s, idx) => (
                                                <tr key={idx} className="hover:bg-gray-50 border-b">
                                                    <td className="p-3">{new Date(s.Timestamp).toLocaleDateString('th-TH')}</td>
                                                    <td className="p-3">{s['ID Card']}</td>
                                                    <td className="p-3">{s.Firstname} {s.Lastname}</td>
                                                    <td className="p-3"><span className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">รอตรวจสอบ</span></td>
                                                    <td className="p-3 text-center">
                                                        <a href={s['Folder URL']} target="_blank" className="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600 transition">
                                                            <i className="fas fa-folder-open mr-1"></i> ดูเอกสาร
                                                        </a>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    }
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // Main Render
            if (viewMode === 'admin') {
                return <AdminPanel />;
            }

            return (
                <div>
                    {/* Header (No Print) */}
                    <div className="bg-gradient-to-r from-cyan-500 to-blue-500 shadow-md text-white py-6 px-4 no-print">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-between">
                            <div className="flex items-center mb-4 md:mb-0">
                                <div className="bg-white p-2 rounded-full mr-4 shadow-lg">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Seal_of_the_Ministry_of_Education_of_Thailand.svg/120px-Seal_of_the_Ministry_of_Education_of_Thailand.svg.png" alt="Logo" className="w-12 h-12 object-contain" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold">ระบบรับสมัครนักเรียน ออนไลน์</h1>
                                    <p className="text-blue-100">โรงเรียนปากแพรกวิทยาคม</p>
                                </div>
                            </div>
                            <button onClick={() => setViewMode('admin')} className="text-sm bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full backdrop-blur transition border border-white/50">
                                <i className="fas fa-lock mr-2"></i>ส่วนของผู้ดูแล
                            </button>
                        </div>
                    </div>

                    {/* Progress Bar (No Print) */}
                    {step < 4 && (
                        <div className="max-w-4xl mx-auto pt-8 px-4 no-print">
                            <div className="flex items-center justify-between relative">
                                <div className="absolute left-0 top-1/2 transform -translate-y-1/2 w-full h-1 bg-gray-200 -z-10"></div>
                                <div className="absolute left-0 top-1/2 transform -translate-y-1/2 h-1 bg-pink-500 transition-all duration-500 -z-10" style={{width: `${(step-1)*50}%`}}></div>
                                
                                {[1, 2, 3].map(num => (
                                    <div key={num} className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm border-4 transition-all duration-300 ${step >= num ? 'bg-pink-500 text-white border-pink-200' : 'bg-white text-gray-400 border-gray-200'}`}>
                                        {num}
                                    </div>
                                ))}
                            </div>
                            <div className="flex justify-between text-xs text-gray-500 mt-2 font-medium">
                                <span>ตรวจสอบข้อมูล</span>
                                <span>กรอกข้อมูลประวัติ</span>
                                <span>อัพโหลดเอกสาร</span>
                            </div>
                        </div>
                    )}

                    {/* Main Content Area */}
                    <div className="max-w-4xl mx-auto p-4 py-8">
                        
                        {/* STEP 1: Verification */}
                        {step === 1 && (
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden animate-fade-in-up border-t-4 border-theme-blue">
                                <div className="p-8">
                                    <h2 className="text-2xl font-bold text-gray-800 mb-6 border-b pb-4"><i className="fas fa-id-card text-blue-500 mr-2"></i> ขั้นตอนที่ 1: ตรวจสอบข้อมูล</h2>
                                    <form onSubmit={checkData} className="space-y-6">
                                        <div>
                                            <label className="block text-gray-700 font-semibold mb-2">เลขประจำตัวประชาชน (13 หลัก) <span className="text-red-500">*</span></label>
                                            <input type="text" name="idCard" value={formData.idCard} onChange={handleInputChange} maxLength="13" required pattern="\d{13}" title="กรุณากรอกตัวเลข 13 หลัก"
                                                className="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition text-lg tracking-widest" placeholder="x-xxxx-xxxxx-xx-x" />
                                        </div>
                                        <div>
                                            <label className="block text-gray-700 font-semibold mb-2">วัน/เดือน/ปีเกิด <span className="text-red-500">*</span></label>
                                            <input type="date" name="dob" value={formData.dob} onChange={handleInputChange} required
                                                className="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />
                                        </div>
                                        <button type="submit" disabled={isLoading} className={`w-full py-4 rounded-lg text-white font-bold text-lg shadow-lg transition-all ${isLoading ? 'bg-gray-400 cursor-not-allowed' : 'bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 hover:-translate-y-1'}`}>
                                            {isLoading ? <><i className="fas fa-spinner fa-spin mr-2"></i>กำลังตรวจสอบข้อมูล...</> : <><i className="fas fa-search mr-2"></i>ตรวจสอบข้อมูล / เข้าสู่ระบบ</>}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* STEP 2: Personal Info */}
                        {step === 2 && (
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden border-t-4 border-theme-pink">
                                <div className="p-8">
                                    <h2 className="text-2xl font-bold text-gray-800 mb-6 border-b pb-4"><i className="fas fa-user-edit text-pink-500 mr-2"></i> ขั้นตอนที่ 2: กรอกข้อมูลส่วนตัว</h2>
                                    <form onSubmit={validateStep2}>
                                        
                                        <div className="mb-8 bg-blue-50 p-6 rounded-xl border border-blue-100">
                                            <h3 className="font-bold text-blue-800 mb-4 text-lg">ระดับชั้นที่ต้องการสมัคร</h3>
                                            <div className="flex gap-6">
                                                <label className="flex items-center gap-2 cursor-pointer p-3 bg-white rounded-lg shadow-sm flex-1 border border-blue-200 hover:bg-blue-100 transition">
                                                    <input type="radio" name="level" value="ม.1" checked={formData.level === 'ม.1'} onChange={handleInputChange} className="w-5 h-5 text-blue-600" /> 
                                                    <span className="text-lg font-medium">มัธยมศึกษาปีที่ 1 (ม.1)</span>
                                                </label>
                                                <label className="flex items-center gap-2 cursor-pointer p-3 bg-white rounded-lg shadow-sm flex-1 border border-blue-200 hover:bg-pink-100 transition">
                                                    <input type="radio" name="level" value="ม.4" checked={formData.level === 'ม.4'} onChange={handleInputChange} className="w-5 h-5 text-pink-600" /> 
                                                    <span className="text-lg font-medium">มัธยมศึกษาปีที่ 4 (ม.4)</span>
                                                </label>
                                            </div>
                                        </div>

                                        <h3 className="text-xl font-bold text-gray-700 mt-8 mb-4">1. ข้อมูลส่วนตัวผู้สมัคร</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                            <div>
                                                <label className="block text-sm text-gray-600 mb-1">คำนำหน้าชื่อ *</label>
                                                <select name="prefix" value={formData.prefix} onChange={handleInputChange} required className="w-full p-2.5 border rounded focus:ring-2 focus:ring-pink-400">
                                                    <option value="">- เลือก -</option>
                                                    <option value="เด็กชาย">เด็กชาย</option>
                                                    <option value="เด็กหญิง">เด็กหญิง</option>
                                                    <option value="นาย">นาย</option>
                                                    <option value="นางสาว">นางสาว</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-sm text-gray-600 mb-1">ชื่อ *</label>
                                                <input type="text" name="firstname" value={formData.firstname} onChange={handleInputChange} required className="w-full p-2.5 border rounded focus:ring-2 focus:ring-pink-400" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-gray-600 mb-1">นามสกุล *</label>
                                                <input type="text" name="lastname" value={formData.lastname} onChange={handleInputChange} required className="w-full p-2.5 border rounded focus:ring-2 focus:ring-pink-400" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                            <div>
                                                <label className="block text-sm text-gray-600 mb-1">เพศ</label>
                                                <div className="flex gap-4 mt-2">
                                                    <label><input type="radio" name="gender" value="ชาย" checked={formData.gender==='ชาย'} onChange={handleInputChange}/> ชาย</label>
                                                    <label><input type="radio" name="gender" value="หญิง" checked={formData.gender==='หญิง'} onChange={handleInputChange}/> หญิง</label>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm text-gray-600 mb-1">สัญชาติ</label>
                                                <input type="text" name="nationality" value={formData.nationality} onChange={handleInputChange} className="w-full p-2.5 border rounded focus:ring-2 focus:ring-pink-400" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-gray-600 mb-1">ศาสนา</label>
                                                <input type="text" name="religion" value={formData.religion} onChange={handleInputChange} className="w-full p-2.5 border rounded focus:ring-2 focus:ring-pink-400" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                                            <div>
                                                <label className="block text-sm text-gray-600 mb-1">ความสามารถพิเศษ (ถ้ามี)</label>
                                                <input type="text" name="talent" value={formData.talent} onChange={handleInputChange} className="w-full p-2.5 border rounded focus:ring-2 focus:ring-pink-400" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-gray-600 mb-1">ความพิการ (ถ้ามี)</label>
                                                <input type="text" name="disability" value={formData.disability} onChange={handleInputChange} className="w-full p-2.5 border rounded focus:ring-2 focus:ring-pink-400" />
                                            </div>
                                        </div>

                                        <h3 className="text-xl font-bold text-gray-700 mt-8 mb-4">2. ข้อมูลที่อยู่ตามทะเบียนบ้าน</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                            <div><label className="block text-sm text-gray-600 mb-1">บ้านเลขที่ *</label><input type="text" name="address" required onChange={handleInputChange} className="w-full p-2.5 border rounded"/></div>
                                            <div><label className="block text-sm text-gray-600 mb-1">หมู่ที่</label><input type="text" name="moo" onChange={handleInputChange} className="w-full p-2.5 border rounded"/></div>
                                            <div><label className="block text-sm text-gray-600 mb-1">ถนน</label><input type="text" name="road" onChange={handleInputChange} className="w-full p-2.5 border rounded"/></div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                            <div><label className="block text-sm text-gray-600 mb-1">จังหวัด *</label><input type="text" name="province" required onChange={handleInputChange} className="w-full p-2.5 border rounded"/></div>
                                            <div><label className="block text-sm text-gray-600 mb-1">อำเภอ/เขต *</label><input type="text" name="district" required onChange={handleInputChange} className="w-full p-2.5 border rounded"/></div>
                                            <div><label className="block text-sm text-gray-600 mb-1">ตำบล/แขวง *</label><input type="text" name="subdistrict" required onChange={handleInputChange} className="w-full p-2.5 border rounded"/></div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                                            <div><label className="block text-sm text-gray-600 mb-1">โทรศัพท์บ้าน</label><input type="text" name="homePhone" onChange={handleInputChange} className="w-full p-2.5 border rounded"/></div>
                                            <div><label className="block text-sm text-gray-600 mb-1">โทรศัพท์มือถือ *</label><input type="text" name="mobile" required onChange={handleInputChange} className="w-full p-2.5 border rounded"/></div>
                                            <div><label className="block text-sm text-gray-600 mb-1">E-mail</label><input type="email" name="email" onChange={handleInputChange} className="w-full p-2.5 border rounded"/></div>
                                        </div>

                                        <h3 className="text-xl font-bold text-gray-700 mt-8 mb-4">3. ข้อมูลการศึกษา</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                                            <div><label className="block text-sm text-gray-600 mb-1">จบจากสถานศึกษา *</label><input type="text" name="prevSchool" required onChange={handleInputChange} className="w-full p-2.5 border rounded"/></div>
                                            <div><label className="block text-sm text-gray-600 mb-1">เกรดเฉลี่ยสะสม (GPA) *</label><input type="number" step="0.01" min="1.00" max="4.00" name="gpa" required onChange={handleInputChange} placeholder="1.00 - 4.00" className="w-full p-2.5 border rounded"/></div>
                                            <div><label className="block text-sm text-gray-600 mb-1">ปีที่สำเร็จการศึกษา *</label><input type="text" name="gradYear" required onChange={handleInputChange} className="w-full p-2.5 border rounded"/></div>
                                        </div>

                                        <div className="flex gap-4 mt-8">
                                            <button type="button" onClick={() => setStep(1)} className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">ย้อนกลับ</button>
                                            <button type="submit" className="flex-1 py-3 bg-pink-500 text-white rounded-lg font-bold hover:bg-pink-600 transition shadow-lg text-lg">ดำเนินการต่อ (อัพโหลดเอกสาร) <i className="fas fa-arrow-right ml-2"></i></button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* STEP 3: File Uploads */}
                        {step === 3 && (
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden border-t-4 border-indigo-500">
                                <div className="p-8">
                                    <h2 className="text-2xl font-bold text-gray-800 mb-6 border-b pb-4"><i className="fas fa-file-upload text-indigo-500 mr-2"></i> ขั้นตอนที่ 3: อัพโหลดเอกสาร</h2>
                                    <div className="bg-yellow-50 border border-yellow-200 p-4 rounded-lg mb-6 text-sm text-yellow-800">
                                        <i className="fas fa-info-circle mr-2"></i> กรุณาเตรียมไฟล์ภาพ (JPG, PNG) หรือ PDF ขนาดไม่เกินไฟล์ละ 2MB
                                    </div>
                                    <form onSubmit={submitApplication} className="space-y-6">
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="border p-4 rounded-lg bg-gray-50">
                                                <label className="block font-semibold mb-2">สำเนาสูติบัตร <span className="text-red-500">*</span></label>
                                                <input type="file" name="birthCert" onChange={handleFileChange} required accept="image/*,.pdf" className="w-full text-sm" />
                                            </div>
                                            <div className="border p-4 rounded-lg bg-gray-50">
                                                <label className="block font-semibold mb-2">บัตรประชาชน (นักเรียน) <span className="text-red-500">*</span></label>
                                                <input type="file" name="idCardDoc" onChange={handleFileChange} required accept="image/*,.pdf" className="w-full text-sm" />
                                            </div>
                                            <div className="border p-4 rounded-lg bg-gray-50">
                                                <label className="block font-semibold mb-2">สำเนาทะเบียนบ้าน (นร./บิดา/มารดา) <span className="text-red-500">*</span></label>
                                                <input type="file" name="houseReg" onChange={handleFileChange} required accept="image/*,.pdf" className="w-full text-sm" />
                                            </div>
                                            <div className="border p-4 rounded-lg bg-gray-50">
                                                <label className="block font-semibold mb-2">รูปถ่ายหน้าตรง ขนาด 1.5 นิ้ว <span className="text-red-500">*</span></label>
                                                <input type="file" name="photo" onChange={handleFileChange} required accept="image/*" className="w-full text-sm" />
                                            </div>
                                            <div className="border p-4 rounded-lg bg-gray-50 md:col-span-2">
                                                <label className="block font-semibold mb-2">ใบ ปพ.1 หรือ เอกสารรับรอง <span className="text-red-500">*</span></label>
                                                <input type="file" name="transcript" onChange={handleFileChange} required accept="image/*,.pdf" className="w-full text-sm" />
                                            </div>
                                        </div>

                                        <div className="flex gap-4 mt-8 pt-6 border-t">
                                            <button type="button" onClick={() => setStep(2)} disabled={isLoading} className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">ย้อนกลับ</button>
                                            <button type="submit" disabled={isLoading} className={`flex-1 py-3 text-white rounded-lg font-bold shadow-lg text-lg transition ${isLoading ? 'bg-gray-400 cursor-not-allowed' : 'bg-green-500 hover:bg-green-600'}`}>
                                                {isLoading ? <><i className="fas fa-spinner fa-spin mr-2"></i>กำลังบันทึกข้อมูลและอัพโหลดไฟล์...</> : <><i className="fas fa-save mr-2"></i>บันทึกข้อมูลและสมัครเรียน</>}
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* STEP 4: Print Application (Traditional Layout) */}
                        {step === 4 && (
                            <div className="print-container bg-white shadow-xl rounded mx-auto p-12 text-sm leading-relaxed border border-gray-200 relative">
                                
                                <div className="no-print absolute top-4 right-4 flex gap-2">
                                    <button onClick={() => window.print()} className="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700"><i className="fas fa-print mr-2"></i>พิมพ์ใบสมัคร (PDF)</button>
                                    <button onClick={() => window.location.reload()} className="bg-gray-500 text-white px-4 py-2 rounded shadow hover:bg-gray-600"><i className="fas fa-home"></i></button>
                                </div>

                                {/* Form Layout similar to image */}
                                <div className="text-center mb-6 relative">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Seal_of_the_Ministry_of_Education_of_Thailand.svg/120px-Seal_of_the_Ministry_of_Education_of_Thailand.svg.png" className="w-16 h-16 mx-auto mb-2 grayscale" alt="Logo"/>
                                    <h2 className="text-xl font-bold mb-2">ใบสมัครเข้าเรียน โรงเรียนปากแพรกวิทยาคม</h2>
                                    <div className="absolute top-0 right-0 w-24 h-32 border border-gray-400 flex items-center justify-center text-gray-400 text-xs">
                                        ติดรูปถ่าย<br/>1.5 นิ้ว
                                    </div>
                                </div>

                                <div className="mb-4">
                                    ปีการศึกษา <span className="border-b border-dotted border-gray-400 inline-block w-32 text-center">{new Date().getFullYear() + 543}</span>
                                    <br/>
                                    สมัครเรียนระดับชั้น <span className="border-b border-dotted border-gray-400 inline-block px-4">{formData.level}</span>
                                </div>

                                <h3 className="font-bold mb-2">๑. ข้อมูลทั่วไปของนักเรียน</h3>
                                <div className="mb-2">
                                    ชื่อ-สกุล <span className="border-b border-dotted border-gray-400 inline-block w-64 px-2">{formData.prefix} {formData.firstname} {formData.lastname}</span>
                                    เพศ <span className="border-b border-dotted border-gray-400 inline-block w-16 px-2 text-center">{formData.gender || '-'}</span>
                                </div>
                                <div className="mb-2 flex items-center">
                                    เลขบัตรประจำตัวประชาชน: 
                                    <div className="flex ml-2">
                                        {formData.idCard.split('').map((digit, i) => (
                                            <div key={i} className="w-5 h-6 border border-gray-500 text-center text-xs leading-6 ml-1">{digit}</div>
                                        ))}
                                    </div>
                                </div>
                                <div className="mb-2">
                                    วัน/เดือน/ปีเกิด <span className="border-b border-dotted border-gray-400 inline-block w-48 px-2">{new Date(formData.dob).toLocaleDateString('th-TH')}</span>
                                </div>
                                <div className="mb-4">
                                    สัญชาติ <span className="border-b border-dotted border-gray-400 inline-block w-32 px-2">{formData.nationality}</span>
                                    ศาสนา <span className="border-b border-dotted border-gray-400 inline-block w-32 px-2">{formData.religion}</span>
                                </div>

                                <h3 className="font-bold mb-2">๒. ข้อมูลสำเร็จการศึกษา</h3>
                                <div className="mb-4">
                                    สถานศึกษาเดิม <span className="border-b border-dotted border-gray-400 inline-block w-64 px-2">{formData.prevSchool}</span>
                                    เกรดเฉลี่ย <span className="border-b border-dotted border-gray-400 inline-block w-24 px-2 text-center">{formData.gpa}</span>
                                </div>

                                <h3 className="font-bold mb-2">๓. ข้อมูลที่อยู่ติดต่อได้</h3>
                                <div className="mb-2">
                                    บ้านเลขที่ <span className="border-b border-dotted border-gray-400 inline-block w-16 px-2">{formData.address}</span>
                                    หมู่ <span className="border-b border-dotted border-gray-400 inline-block w-12 px-2">{formData.moo}</span>
                                    ถนน <span className="border-b border-dotted border-gray-400 inline-block w-32 px-2">{formData.road}</span>
                                </div>
                                <div className="mb-2">
                                    ตำบล/แขวง <span className="border-b border-dotted border-gray-400 inline-block w-40 px-2">{formData.subdistrict}</span>
                                    อำเภอ/เขต <span className="border-b border-dotted border-gray-400 inline-block w-40 px-2">{formData.district}</span>
                                </div>
                                <div className="mb-4">
                                    จังหวัด <span className="border-b border-dotted border-gray-400 inline-block w-40 px-2">{formData.province}</span>
                                    โทรศัพท์ <span className="border-b border-dotted border-gray-400 inline-block w-40 px-2">{formData.mobile}</span>
                                </div>

                                <div className="mt-12 text-center font-bold">
                                    ข้าพเจ้าขอรับรองว่าข้อมูลที่ได้แจ้งไว้ข้างต้น เป็นความจริงทุกประการ
                                </div>

                                <div className="flex justify-between mt-16 px-10">
                                    <div className="text-center">
                                        ลงชื่อ......................................................ผู้สมัคร<br/>
                                        (......................................................)<br/>
                                        ........../........../..........
                                    </div>
                                    <div className="text-center">
                                        ลงชื่อ......................................................เจ้าหน้าที่รับสมัคร<br/>
                                        (......................................................)<br/>
                                        ........../........../..........
                                    </div>
                                </div>

                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
