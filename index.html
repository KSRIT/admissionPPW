<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรับสมัครนักเรียนออนไลน์</title>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .form-section-title { @apply text-xl font-bold text-blue-800 border-b-2 border-blue-200 pb-2 mb-6 mt-8 flex items-center; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // URL ของ Google Apps Script (Web App) ของคุณ
        const GAS_WEBAPP_URL = 'ใส่_URL_WEB_APP_ของคุณที่นี่';

        function App() {
            const [step, setStep] = useState(1);
            const [isLoading, setIsLoading] = useState(false);
            const [alertMsg, setAlertMsg] = useState({ type: '', text: '' });
            
            // เพิ่มฟิลด์ให้ครบตามแบบฟอร์มใหม่
            const [formData, setFormData] = useState({
                idCard: '', level: 'มัธยมศึกษาปีที่ 1', prefix: 'ด.ช.', firstname: '', lastname: '', nickname: '', 
                gender: 'ชาย', dob: '', age: '', race: 'ไทย', nationality: 'ไทย', religion: 'พุทธ', disability: '-',
                prevSchool: '', prevProvince: '', lastGrade: '', leaveReason: '-',
                address: '', moo: '-', road: '-', subdistrict: '', district: '', province: '', zipcode: '', homePhone: '-', mobile: '',
                fatherName: '-', fatherAge: '', fatherOcc: '-', fatherInc: '-', fatherPhone: '-',
                motherName: '-', motherAge: '', motherOcc: '-', motherInc: '-', motherPhone: '-',
                parentsStatus: 'อยู่ร่วมกัน',
                guardianName: '-', guardianAge: '', guardianOcc: '-', guardianInc: '-', guardianPhone: '-', guardianRel: '-'
            });

            const [files, setFiles] = useState({ birthCert: null, idCardDoc: null, houseReg: null, photo: null, transcript: null });

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                if (name === 'idCard') {
                    const onlyNums = value.replace(/[^0-9]/g, '');
                    if (onlyNums.length <= 13) setFormData(prev => ({ ...prev, [name]: onlyNums }));
                } else {
                    setFormData(prev => ({ ...prev, [name]: value }));
                }
            };

            const handleFileChange = (e) => {
                const { name, files: selectedFiles } = e.target;
                if (selectedFiles.length > 0) {
                    const file = selectedFiles[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const base64 = event.target.result.split(',')[1];
                        setFiles(prev => ({ ...prev, [name]: { base64: base64, mimeType: file.type, extension: file.name.split('.').pop() } }));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const showAlert = (type, text) => {
                setAlertMsg({ type, text });
                setTimeout(() => setAlertMsg({ type: '', text: '' }), 5000);
            };

            const checkData = async (e) => {
                e.preventDefault();
                if (formData.idCard.length !== 13) {
                    showAlert('error', 'กรุณากรอกเลขบัตรประชาชนให้ครบ 13 หลัก');
                    return;
                }
                setIsLoading(true);
                try {
                    const res = await fetch(GAS_WEBAPP_URL, {
                        method: 'POST', body: JSON.stringify({ action: 'check_student', idCard: formData.idCard })
                    });
                    const result = await res.json();
                    
                    if (result.status === 'found') {
                        setFormData(prev => ({ ...prev, ...result.data }));
                        showAlert('success', 'พบข้อมูลเดิมในระบบ คุณสามารถแก้ไขข้อมูลและอัปโหลดเอกสารใหม่ได้');
                    } else {
                        showAlert('info', 'ไม่พบข้อมูลเดิม กรุณากรอกข้อมูลเพื่อสมัครใหม่');
                    }
                    setStep(2);
                } catch (error) {
                    showAlert('error', 'เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง');
                }
                setIsLoading(false);
            };

            const submitForm = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    const payload = { action: 'submit_application', ...formData, files: files };
                    const res = await fetch(GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    if (result.status === 'success') {
                        showAlert('success', 'บันทึกข้อมูลและสร้างใบสมัครสำเร็จเรียบร้อยแล้ว!');
                        setStep(3);
                    } else {
                        showAlert('error', 'เกิดข้อผิดพลาด: ' + result.message);
                    }
                } catch (error) {
                    showAlert('error', 'เกิดข้อผิดพลาดในการส่งข้อมูล');
                }
                setIsLoading(false);
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-blue-700 to-blue-500 text-white py-10 shadow-lg mb-8">
                        <div className="max-w-4xl mx-auto px-4 text-center">
                            <h1 className="text-4xl font-bold mb-2">ระบบรับสมัครนักเรียนออนไลน์</h1>
                            <p className="text-blue-100 text-lg">กรอกข้อมูลให้ครบถ้วนเพื่อสร้างใบสมัครอัตโนมัติ</p>
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto px-4">
                        {/* Alert Box */}
                        {alertMsg.text && (
                            <div className={`p-4 mb-6 rounded-lg text-white font-medium shadow-md animate-fade-in-up ${alertMsg.type === 'error' ? 'bg-red-500' : alertMsg.type === 'success' ? 'bg-green-500' : 'bg-blue-500'}`}>
                                {alertMsg.text}
                            </div>
                        )}

                        {/* Step 1 */}
                        {step === 1 && (
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden animate-fade-in-up border-t-4 border-blue-500 p-8 max-w-lg mx-auto">
                                <h2 className="text-2xl font-bold text-gray-800 mb-6 text-center">ตรวจสอบข้อมูล / เข้าสู่ระบบ</h2>
                                <form onSubmit={checkData} className="space-y-6">
                                    <div>
                                        <label className="block text-gray-700 font-semibold mb-2">เลขประจำตัว 13 หลัก <span className="text-red-500">*</span></label>
                                        <input type="text" name="idCard" value={formData.idCard} onChange={handleInputChange} required inputMode="numeric"
                                            className="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-xl tracking-widest text-center" placeholder="กรอกตัวเลข 13 หลักติดกัน" />
                                    </div>
                                    <button type="submit" disabled={isLoading} className="w-full py-4 rounded-lg text-white font-bold text-lg bg-blue-600 hover:bg-blue-700 shadow-lg">
                                        {isLoading ? 'กำลังตรวจสอบ...' : 'ตรวจสอบข้อมูล'}
                                    </button>
                                </form>
                            </div>
                        )}

                        {/* Step 2: Form */}
                        {step === 2 && (
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden animate-fade-in-up border-t-4 border-blue-500 p-8">
                                <form onSubmit={submitForm}>
                                    
                                    {/* 1. ข้อมูลทั่วไป */}
                                    <h3 className="form-section-title"><i className="fas fa-user mr-2"></i> 1. ข้อมูลทั่วไปของนักเรียน</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                        <div><label className="block text-gray-700 text-sm mb-1">ระดับชั้นที่สมัคร</label>
                                            <select name="level" value={formData.level} onChange={handleInputChange} className="w-full p-2 border rounded">
                                                <option value="มัธยมศึกษาปีที่ 1">มัธยมศึกษาปีที่ 1</option>
                                                <option value="มัธยมศึกษาปีที่ 4">มัธยมศึกษาปีที่ 4</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                                        <div><label className="block text-gray-700 text-sm mb-1">คำนำหน้า</label>
                                            <select name="prefix" value={formData.prefix} onChange={handleInputChange} className="w-full p-2 border rounded">
                                                <option value="ด.ช.">ด.ช.</option><option value="ด.ญ.">ด.ญ.</option><option value="นาย">นาย</option><option value="นางสาว">นางสาว</option>
                                            </select>
                                        </div>
                                        <div className="md:col-span-1"><label className="block text-gray-700 text-sm mb-1">ชื่อ</label><input type="text" name="firstname" value={formData.firstname} onChange={handleInputChange} required className="w-full p-2 border rounded" /></div>
                                        <div className="md:col-span-1"><label className="block text-gray-700 text-sm mb-1">นามสกุล</label><input type="text" name="lastname" value={formData.lastname} onChange={handleInputChange} required className="w-full p-2 border rounded" /></div>
                                        <div className="md:col-span-1"><label className="block text-gray-700 text-sm mb-1">ชื่อเล่น</label><input type="text" name="nickname" value={formData.nickname} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                                        <div><label className="block text-gray-700 text-sm mb-1">เพศ</label>
                                            <select name="gender" value={formData.gender} onChange={handleInputChange} className="w-full p-2 border rounded">
                                                <option value="ชาย">ชาย</option><option value="หญิง">หญิง</option>
                                            </select>
                                        </div>
                                        <div><label className="block text-gray-700 text-sm mb-1">วัน/เดือน/ปีเกิด</label><input type="date" name="dob" value={formData.dob} onChange={handleInputChange} required className="w-full p-2 border rounded" /></div>
                                        <div><label className="block text-gray-700 text-sm mb-1">อายุ (ปี)</label><input type="number" name="age" value={formData.age} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                        <div><label className="block text-gray-700 text-sm mb-1">ศาสนา</label><input type="text" name="religion" value={formData.religion} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                        <div><label className="block text-gray-700 text-sm mb-1">เชื้อชาติ</label><input type="text" name="race" value={formData.race} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                        <div><label className="block text-gray-700 text-sm mb-1">สัญชาติ</label><input type="text" name="nationality" value={formData.nationality} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                        <div><label className="block text-gray-700 text-sm mb-1">โรคประจำตัว/แพ้ยา</label><input type="text" name="disability" value={formData.disability} onChange={handleInputChange} placeholder="ไม่มีให้ใส่ -" className="w-full p-2 border rounded" /></div>
                                    </div>

                                    {/* 2. ข้อมูลสำเร็จการศึกษา */}
                                    <h3 className="form-section-title"><i className="fas fa-graduation-cap mr-2"></i> 2. ข้อมูลสำเร็จการศึกษา</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div><label className="block text-gray-700 text-sm mb-1">สถานศึกษาเดิม</label><input type="text" name="prevSchool" value={formData.prevSchool} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                        <div><label className="block text-gray-700 text-sm mb-1">จังหวัด (สถานศึกษาเดิม)</label><input type="text" name="prevProvince" value={formData.prevProvince} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div><label className="block text-gray-700 text-sm mb-1">เรียนชั้นสุดท้าย</label><input type="text" name="lastGrade" value={formData.lastGrade} onChange={handleInputChange} placeholder="เช่น ป.6, ม.3" className="w-full p-2 border rounded" /></div>
                                        <div><label className="block text-gray-700 text-sm mb-1">สาเหตุที่ออกจากโรงเรียนเดิม</label><input type="text" name="leaveReason" value={formData.leaveReason} onChange={handleInputChange} placeholder="เช่น สำเร็จการศึกษา" className="w-full p-2 border rounded" /></div>
                                    </div>

                                    {/* 3. ข้อมูลครอบครัว */}
                                    <h3 className="form-section-title"><i className="fas fa-home mr-2"></i> 3. ข้อมูลครอบครัว (ที่อยู่ปัจจุบัน)</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                                        <div><label className="block text-gray-700 text-sm mb-1">บ้านเลขที่</label><input type="text" name="address" value={formData.address} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                        <div><label className="block text-gray-700 text-sm mb-1">หมู่ที่</label><input type="text" name="moo" value={formData.moo} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                        <div className="md:col-span-2"><label className="block text-gray-700 text-sm mb-1">ถนน</label><input type="text" name="road" value={formData.road} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                                        <div><label className="block text-gray-700 text-sm mb-1">ตำบล/แขวง</label><input type="text" name="subdistrict" value={formData.subdistrict} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                        <div><label className="block text-gray-700 text-sm mb-1">อำเภอ/เขต</label><input type="text" name="district" value={formData.district} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                        <div><label className="block text-gray-700 text-sm mb-1">จังหวัด</label><input type="text" name="province" value={formData.province} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                        <div><label className="block text-gray-700 text-sm mb-1">รหัสไปรษณีย์</label><input type="text" name="zipcode" value={formData.zipcode} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                        <div><label className="block text-gray-700 text-sm mb-1">เบอร์โทรศัพท์บ้าน</label><input type="text" name="homePhone" value={formData.homePhone} onChange={handleInputChange} className="w-full p-2 border rounded" /></div>
                                        <div><label className="block text-gray-700 text-sm mb-1">เบอร์โทรศัพท์มือถือ</label><input type="text" name="mobile" value={formData.mobile} onChange={handleInputChange} required className="w-full p-2 border rounded" /></div>
                                    </div>

                                    <div className="bg-gray-50 p-4 rounded-lg border mb-4">
                                        <h4 className="font-bold text-gray-700 mb-3 border-b pb-2">ข้อมูลบิดา</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-5 gap-3">
                                            <div className="md:col-span-2"><label className="text-xs">ชื่อ-สกุล บิดา</label><input type="text" name="fatherName" value={formData.fatherName} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                            <div><label className="text-xs">อายุ</label><input type="text" name="fatherAge" value={formData.fatherAge} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                            <div><label className="text-xs">อาชีพ</label><input type="text" name="fatherOcc" value={formData.fatherOcc} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                            <div><label className="text-xs">รายได้/เดือน</label><input type="text" name="fatherInc" value={formData.fatherInc} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                            <div className="md:col-span-2"><label className="text-xs">เบอร์โทรศัพท์</label><input type="text" name="fatherPhone" value={formData.fatherPhone} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 p-4 rounded-lg border mb-4">
                                        <h4 className="font-bold text-gray-700 mb-3 border-b pb-2">ข้อมูลมารดา</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-5 gap-3">
                                            <div className="md:col-span-2"><label className="text-xs">ชื่อ-สกุล มารดา</label><input type="text" name="motherName" value={formData.motherName} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                            <div><label className="text-xs">อายุ</label><input type="text" name="motherAge" value={formData.motherAge} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                            <div><label className="text-xs">อาชีพ</label><input type="text" name="motherOcc" value={formData.motherOcc} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                            <div><label className="text-xs">รายได้/เดือน</label><input type="text" name="motherInc" value={formData.motherInc} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                            <div className="md:col-span-2"><label className="text-xs">เบอร์โทรศัพท์</label><input type="text" name="motherPhone" value={formData.motherPhone} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                        </div>
                                    </div>

                                    <div className="mb-4">
                                        <label className="block text-gray-700 font-semibold mb-2">สถานภาพของบิดา-มารดา</label>
                                        <div className="flex gap-4">
                                            {['อยู่ร่วมกัน', 'แยกกันอยู่', 'หย่าร้าง', 'หม้าย'].map(status => (
                                                <label key={status} className="flex items-center cursor-pointer">
                                                    <input type="radio" name="parentsStatus" value={status} checked={formData.parentsStatus === status} onChange={handleInputChange} className="mr-2" /> {status}
                                                </label>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 4. ผู้ปกครอง */}
                                    <h3 className="form-section-title"><i className="fas fa-user-shield mr-2"></i> 4. ผู้ปกครอง (กรณีไม่ใช่บิดา-มารดา)</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-6 gap-3 mb-6">
                                        <div className="md:col-span-2"><label className="text-xs">ชื่อ-สกุล</label><input type="text" name="guardianName" value={formData.guardianName} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                        <div><label className="text-xs">อายุ</label><input type="text" name="guardianAge" value={formData.guardianAge} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                        <div><label className="text-xs">อาชีพ</label><input type="text" name="guardianOcc" value={formData.guardianOcc} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                        <div><label className="text-xs">รายได้/เดือน</label><input type="text" name="guardianInc" value={formData.guardianInc} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                        <div><label className="text-xs">ความสัมพันธ์</label><input type="text" name="guardianRel" value={formData.guardianRel} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                        <div className="md:col-span-2"><label className="text-xs">เบอร์โทรศัพท์</label><input type="text" name="guardianPhone" value={formData.guardianPhone} onChange={handleInputChange} className="w-full p-2 border rounded text-sm"/></div>
                                    </div>

                                    {/* ส่วนอัพโหลดไฟล์ยังคงเดิม */}
                                    <h3 className="form-section-title"><i className="fas fa-file-upload mr-2"></i> 5. อัปโหลดเอกสาร</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 bg-blue-50 p-4 rounded-lg">
                                        {['birthCert:สูติบัตร', 'idCardDoc:บัตรประชาชน', 'houseReg:ทะเบียนบ้าน', 'photo:รูปถ่าย', 'transcript:ปพ.1 / ใบรับรอง'].map(item => {
                                            const [key, label] = item.split(':');
                                            return (
                                                <div key={key}>
                                                    <label className="block text-gray-700 text-sm font-semibold mb-1">{label}</label>
                                                    <input type="file" name={key} onChange={handleFileChange} className="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
                                                </div>
                                            )
                                        })}
                                    </div>

                                    <div className="flex justify-between mt-8">
                                        <button type="button" onClick={() => setStep(1)} className="px-6 py-3 bg-gray-500 text-white rounded-lg font-semibold hover:bg-gray-600">ย้อนกลับ</button>
                                        <button type="submit" disabled={isLoading} className="px-8 py-3 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 shadow-lg flex items-center">
                                            {isLoading ? 'กำลังบันทึกข้อมูล...' : <><i className="fas fa-save mr-2"></i> ยืนยันการสมัคร</>}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}

                        {/* Step 3 */}
                        {step === 3 && (
                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden animate-fade-in-up border-t-4 border-green-500 p-8 text-center max-w-lg mx-auto">
                                <i className="fas fa-check-circle text-6xl text-green-500 mb-4"></i>
                                <h2 className="text-3xl font-bold text-gray-800 mb-2">สมัครสำเร็จ!</h2>
                                <p className="text-gray-600 mb-8">ข้อมูลของคุณถูกบันทึกและสร้างใบสมัครเรียบร้อยแล้ว</p>
                                <button onClick={() => window.location.reload()} className="w-full py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">กลับหน้าแรก</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
